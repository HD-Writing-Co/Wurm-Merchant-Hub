<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wurm Hub | Global Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .wurm-card {
            background: #141414;
            border: 1px solid #222;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .wurm-card:hover {
            border-color: #d4af37;
            transform: translateY(-4px);
            background: #1a1a1a;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }
        .gold-gradient { background: linear-gradient(to right, #d4af37, #f4cf67); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-[#0f0f0f] border-r border-stone-900 flex flex-col sticky top-0 h-screen overflow-y-auto">
        <div class="p-6 flex flex-col h-full">
            <h1 class="text-xl font-black gold-gradient tracking-tighter mb-8 italic uppercase text-center">WURM HUB</h1>
            <div id="nav-auth" class="mb-8"></div>
            <div class="mt-auto opacity-20 text-[9px] uppercase font-black tracking-[0.2em] text-center border-t border-stone-900 pt-6">Market v2.5</div>
        </div>
    </aside>

    <main class="flex-1 p-8">
        <div class="max-w-[1600px] mx-auto">
            
            <div class="grid grid-cols-3 gap-6 mb-10">
                <div class="p-4 bg-[#111] rounded-2xl border border-stone-900">
                    <p class="text-[9px] font-black uppercase text-stone-600 tracking-widest mb-1">Total Items</p>
                    <h2 id="stat-items" class="text-2xl font-black text-white italic">0</h2>
                </div>
                <div class="p-4 bg-[#111] rounded-2xl border border-stone-900">
                    <p class="text-[9px] font-black uppercase text-stone-600 tracking-widest mb-1">Merchants</p>
                    <h2 id="stat-sellers" class="text-2xl font-black text-white italic">0</h2>
                </div>
                <div class="p-4 bg-[#111] rounded-2xl border border-stone-900">
                    <p class="text-[9px] font-black uppercase text-stone-700 tracking-widest mb-1">Server Connectivity</p>
                    <h2 class="text-2xl font-black text-yellow-700 italic">Online</h2>
                </div>
            </div>

            <header class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">Marketplace</h2>
                    <p class="text-stone-500 text-xs italic">Live listings from across the cluster.</p>
                </div>
                <div class="w-full max-w-md relative">
                    <i data-lucide="search" class="absolute left-4 top-3 text-stone-600 w-4 h-4"></i>
                    <input type="text" id="search-bar" placeholder="Search items..." class="w-full bg-[#111] border border-stone-900 p-2.5 pl-12 rounded-xl text-sm outline-none focus:border-yellow-700/50">
                </div>
            </header>

            <div id="inventory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                <div class="col-span-full py-20 text-center text-stone-700 italic uppercase text-xs tracking-widest">Initialising Trade Network...</div>
            </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const _url = 'https://gjftmhvteylhtlwcouwg.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k';
        const client = createClient(_url, _key);

        const iconMap = {
            'Carpentry': 'hammer', 'Smithing': 'anvil', 'Mining': 'pickaxe', 'Masonry': 'bricks',
            'Tailoring': 'scissors', 'Farming': 'wheat', 'Cooking': 'utensils', 'Jewelry': 'gem',
            'Alchemy': 'flask-conical', 'Shipbuilding': 'ship', 'Animal Husbandry': 'horse', 'Misc': 'box',
            'Leatherworking': 'tent', 'Pottery': 'archive', 'Armor': 'shield', 'Weapons': 'sword', 'Tools': 'wrench'
        };

        async function init() {
            const { data: { session } } = await client.auth.getSession();
            const authDiv = document.getElementById('nav-auth');
            
            if (session) {
                authDiv.innerHTML = `<a href="dashboard.html" class="flex flex-col items-center p-4 rounded-2xl bg-yellow-900/5 border border-yellow-700/20 hover:border-yellow-500/50 transition-all text-center">
                    <div class="w-10 h-10 rounded-xl bg-yellow-600 flex items-center justify-center mb-2 shadow-lg"><i data-lucide="layout-dashboard" class="w-5 h-5 text-black"></i></div>
                    <span class="text-xs font-bold text-white uppercase">Dashboard</span>
                </a>`;
            } else {
                authDiv.innerHTML = `<a href="login.html" class="flex flex-col items-center p-4 rounded-2xl bg-[#111] border border-stone-900 hover:border-yellow-700/50 transition-all text-center">
                    <div class="w-10 h-10 rounded-xl bg-stone-800 flex items-center justify-center mb-2"><i data-lucide="log-in" class="w-5 h-5 text-stone-500"></i></div>
                    <span class="text-xs font-bold text-white uppercase tracking-tighter">Merchant Login</span>
                </a>`;
            }

            const { data: products } = await client.from('products').select('*');
            const { data: profiles } = await client.from('profiles').select('id, character_name, server_name');
            
            if (products) {
                document.getElementById('stat-items').innerText = products.length;
                document.getElementById('stat-sellers').innerText = new Set(products.map(p => p.seller_id)).size;
                const profileMap = Object.fromEntries(profiles.map(p => [p.id, p]));
                
                const grid = document.getElementById('inventory-grid');
                grid.innerHTML = products.map(item => {
                    const prof = profileMap[item.seller_id] || { character_name: 'Merchant', server_name: 'Unknown' };
                    
                    // Smart Price with Iron Support
                    let priceHtml = "";
                    if (item.price_g > 0) priceHtml += `<span class="text-yellow-500">${item.price_g}g</span> `;
                    if (item.price_s > 0) priceHtml += `<span class="text-stone-300">${item.price_s}s</span> `;
                    if (item.price_c > 0) priceHtml += `<span class="text-orange-700">${item.price_c}c</span> `;
                    if (item.price_i > 0 || priceHtml === "") priceHtml += `<span class="text-stone-600">${item.price_i || 0}i</span>`;
                    
                    const icon = iconMap[item.category] || 'box';

                    return `
                        <div class="wurm-card rounded-2xl p-5 flex flex-col justify-between min-h-[260px]">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div class="w-10 h-10 rounded-lg bg-stone-900 border border-stone-800 flex items-center justify-center text-stone-500"><i data-lucide="${icon}" class="w-5 h-5"></i></div>
                                    <span class="text-[8px] font-black uppercase text-stone-700 tracking-widest bg-black/40 px-2 py-1 rounded-md border border-stone-900">${prof.server_name}</span>
                                </div>
                                <span class="text-[8px] font-black uppercase text-yellow-600 tracking-[0.2em] mb-1 block">${item.category}</span>
                                <h4 class="text-white font-bold text-lg tracking-tight mb-2 truncate">${item.item_name}</h4>
                                <div class="flex items-center gap-2">
                                    <div class="px-2 py-0.5 bg-black rounded border border-stone-900 text-[9px] font-bold text-stone-500">QL ${item.base_ql || '??'}</div>
                                    <span class="text-[9px] text-stone-600 font-bold uppercase italic truncate">by ${prof.character_name}</span>
                                </div>
                            </div>
                            <div class="mt-6 pt-4 border-t border-stone-900/50 flex justify-between items-center">
                                <div class="text-lg font-black italic tracking-tighter">${priceHtml}</div>
                                <a href="merchant.html?id=${item.seller_id}" class="p-2.5 bg-stone-900 hover:bg-yellow-600 text-stone-500 hover:text-black rounded-lg transition-all border border-stone-800">
                                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                                </a>
                            </div>
                        </div>`;
                }).join('');
            }
            if (window.lucide) lucide.createIcons();
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
