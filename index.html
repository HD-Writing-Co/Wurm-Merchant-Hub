<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wurm Hub | Community Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        
        .market-card { 
            background: linear-gradient(180deg, #161616 0%, #0c0c0c 100%);
            border: 2px solid #222; 
            border-radius: 2rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .market-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .ql-common { border-color: #d4af37; box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.15), 0 0 20px rgba(212, 175, 55, 0.05); }
        .ql-rare { border-color: #3b82f6; box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.2), 0 0 20px rgba(59, 130, 246, 0.1); }
        .ql-supreme { border-color: #0ea5e9; box-shadow: inset 0 0 15px rgba(14, 165, 233, 0.2), 0 0 20px rgba(14, 165, 233, 0.1); }
        .ql-fantastic { border-color: #ec4899; box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.25), 0 0 25px rgba(236, 72, 153, 0.15); }

        .search-input { background: #111; border: 1px solid #222; color: white; padding: 0.6rem 1rem; border-radius: 0.75rem; outline: none; font-size: 0.75rem; width: 100%; }
        .search-input:focus { border-color: #d4af37; }
        
        .icon-header { 
            background: #1a1a1a; 
            border-radius: 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 54px; 
            height: 54px; 
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: -27px; 
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        #inquiry-modal { backdrop-filter: blur(8px); background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4">
            <a href="index.html" class="flex items-center gap-3 text-white font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="shopping-bag" class="w-4 h-4 text-yellow-600"></i> Browse Market
            </a>
            <a href="dashboard.html" class="flex items-center gap-3 text-stone-500 hover:text-white font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Merchant Portal
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-16">
        <div class="max-w-7xl mx-auto">
            <div class="mb-20 grid grid-cols-1 md:grid-cols-4 gap-4 bg-[#141414] p-6 rounded-2xl border border-stone-900 shadow-2xl">
                <input type="text" id="search-item" class="search-input" placeholder="Product Name">
                <input type="text" id="search-seller" class="search-input" placeholder="Seller Name">
                <select id="search-category" class="search-input">
                    <option value="">All Categories</option>
                    <option value="Tools">Tools</option>
                    <option value="Armor">Armor</option>
                    <option value="Weapons">Weapons</option>
                    <option value="Resources">Resources</option>
                    <option value="Bred Animals">Bred Animals</option>
                </select>
                <select id="search-server" class="search-input">
                    <option value="">All Servers</option>
                    <option value="Cadence">Cadence</option>
                    <option value="Harmony">Harmony</option>
                    <option value="Melody">Melody</option>
                    <option value="Zenith">Zenith</option>
                </select>
            </div>

            <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-16 gap-x-8"></div>
        </div>
    </main>

    <div id="inquiry-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
        <div class="bg-[#111] border border-stone-800 w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <div class="flex items-center gap-3 mb-6">
                <div id="modal-icon-bg" class="p-3 rounded-2xl">
                    <i id="modal-icon" data-lucide="mail" class="w-6 h-6"></i>
                </div>
                <div>
                    <h2 id="modal-title" class="text-white font-black uppercase text-xl tracking-tighter">Send Inquiry</h2>
                    <p id="modal-item-display" class="text-stone-500 text-[9px] font-black uppercase tracking-widest"></p>
                </div>
            </div>
            
            <form id="inquiry-form" class="space-y-4">
                <input type="hidden" id="target-seller-id">
                <input type="hidden" id="target-item-name">
                <input type="hidden" id="contact-method" value="dashboard">
                
                <div>
                    <label class="text-[9px] font-black text-stone-600 uppercase block mb-1">Your Character Name</label>
                    <input type="text" id="sender-name" class="search-input" placeholder="e.g. Nefig" required>
                </div>
                <div>
                    <label class="text-[9px] font-black text-stone-600 uppercase block mb-1">Your Message</label>
                    <textarea id="sender-msg" class="search-input h-32 text-xs" placeholder="I'd like to buy this!" required></textarea>
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeInquiry()" class="flex-1 py-4 text-stone-500 text-[10px] font-black uppercase hover:text-white">Cancel</button>
                    <button type="submit" id="submit-btn-text" class="flex-1 py-4 bg-yellow-600 text-black text-[10px] font-black uppercase rounded-2xl hover:bg-white transition-all shadow-lg">Send Message</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const client = createClient('https://gjftmhvteylhtlwcouwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k');

        let allItems = [];

        async function loadMarket() {
            const { data: items, error } = await client.from('products').select(`*, profiles(character_name, server_name, discord_id)`);
            if (error) return;
            allItems = items;
            renderMarket(allItems);
        }

        function getIcon(cat) {
            const map = { 'Tools': 'hammer', 'Armor': 'shield', 'Weapons': 'swords', 'Resources': 'box', 'Bred Animals': 'dog' };
            return map[cat] || 'package';
        }

        function renderMarket(items) {
            const container = document.getElementById('market-grid');
            container.innerHTML = items.map(item => {
                let qlClass = "ql-common", qlColor = "text-[#d4af37]";
                if (item.base_ql >= 90) { qlClass = "ql-fantastic"; qlColor = "text-[#ec4899]"; }
                else if (item.base_ql >= 70) { qlClass = "ql-supreme"; qlColor = "text-[#0ea5e9]"; }
                else if (item.base_ql >= 50) { qlClass = "ql-rare"; qlColor = "text-[#3b82f6]"; }

                const price = [
                    item.price_g > 0 ? `<span class="text-yellow-500">${item.price_g}g</span>` : '',
                    item.price_s > 0 ? `<span class="text-stone-300">${item.price_s}s</span>` : '',
                    item.price_c > 0 ? `<span class="text-orange-600">${item.price_c}c</span>` : '',
                    item.price_i > 0 ? `<span class="text-blue-300">${item.price_i}i</span>` : ''
                ].filter(p => p !== "").join(' ');

                return `
                <div class="market-card p-8 ${qlClass}">
                    <div class="icon-header ${qlColor}"><i data-lucide="${getIcon(item.category)}" class="w-6 h-6"></i></div>
                    <h3 class="text-white font-black uppercase text-xl mb-3 tracking-tight">${item.item_name}</h3>
                    <p class="text-[11px] text-stone-300 font-extrabold uppercase tracking-[0.15em] mb-8">
                        <span class="${qlColor}">QL ${item.base_ql}</span> <span class="mx-2 text-stone-700">•</span> ${item.profiles?.server_name || 'Global'}
                    </p>
                    <div class="font-mono text-2xl font-black mb-10">${price || '<span class="text-stone-800 text-sm italic">Taking Offers</span>'}</div>
                    <div class="w-full pt-6 border-t border-stone-900/50 flex justify-between items-center mt-auto">
                        <div class="text-left">
                            <span class="block text-[8px] font-black text-stone-700 uppercase mb-1">Merchant</span>
                            <span class="text-[10px] font-black text-stone-400 uppercase tracking-tighter">${item.profiles?.character_name || 'Unknown'}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openInquiry('${item.seller_id}', '${item.item_name}', 'dashboard')" class="bg-stone-900 border border-stone-800 text-white p-3 rounded-xl hover:bg-white hover:text-black transition-all">
                                <i data-lucide="mail" class="w-4 h-4"></i>
                            </button>
                            ${item.profiles?.discord_id ? `
                            <button onclick="openInquiry('${item.seller_id}', '${item.item_name}', 'discord')" class="bg-[#5865F2]/10 border border-[#5865F2]/20 text-[#5865F2] p-3 rounded-xl hover:bg-[#5865F2] hover:text-white transition-all">
                                <i data-lucide="message-square" class="w-4 h-4"></i>
                            </button>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.openInquiry = (sellerId, itemName, mode) => {
            document.getElementById('target-seller-id').value = sellerId;
            document.getElementById('target-item-name').value = itemName;
            document.getElementById('contact-method').value = mode;
            document.getElementById('modal-item-display').innerText = `Item: ${itemName}`;
            
            const btn = document.getElementById('submit-btn-text');
            const iconBg = document.getElementById('modal-icon-bg');
            const icon = document.getElementById('modal-icon');

            if (mode === 'discord') {
                document.getElementById('modal-title').innerText = "Discord Inquiry";
                btn.innerText = "Send via Bot";
                btn.className = "flex-1 py-4 bg-[#5865F2] text-white text-[10px] font-black uppercase rounded-2xl hover:opacity-90 transition-all shadow-lg";
                iconBg.className = "p-3 bg-[#5865F2]/10 rounded-2xl text-[#5865F2]";
                icon.setAttribute('data-lucide', 'message-square');
            } else {
                document.getElementById('modal-title').innerText = "Dashboard Message";
                btn.innerText = "Send to Merchant";
                btn.className = "flex-1 py-4 bg-yellow-600 text-black text-[10px] font-black uppercase rounded-2xl hover:bg-white transition-all shadow-lg";
                iconBg.className = "p-3 bg-yellow-600/10 rounded-2xl text-yellow-600";
                icon.setAttribute('data-lucide', 'mail');
            }
            
            lucide.createIcons();
            document.getElementById('inquiry-modal').classList.replace('hidden', 'flex');
        };

        window.closeInquiry = () => {
            document.getElementById('inquiry-modal').classList.replace('flex', 'hidden');
            document.getElementById('inquiry-form').reset();
        };

        document.getElementById('inquiry-form').onsubmit = async (e) => {
            e.preventDefault();
            const mode = document.getElementById('contact-method').value;
            const payload = {
                seller_id: document.getElementById('target-seller-id').value,
                item_name: document.getElementById('target-item-name').value,
                sender_name: document.getElementById('sender-name').value,
                message: document.getElementById('sender-msg').value,
                is_archived: false
            };

            const { error } = await client.from('inquiries').insert([payload]);
            if (!error) {
                alert(mode === 'discord' ? "Inquiry sent via Discord Bot!" : "Message sent to merchant dashboard!");
                closeInquiry();
            } else {
                alert("Error: " + error.message);
            }
        };

        const filter = () => {
            const i = document.getElementById('search-item').value.toLowerCase();
            const s = document.getElementById('search-seller').value.toLowerCase();
            const c = document.getElementById('search-category').value;
            const sv = document.getElementById('search-server').value;

            renderMarket(allItems.filter(item => 
                item.item_name.toLowerCase().includes(i) &&
                (item.profiles?.character_name || '').toLowerCase().includes(s) &&
                (c === "" || item.category === c) &&
                (sv === "" || item.profiles?.server_name === sv)
            ));
        };

        document.querySelectorAll('.search-input').forEach(el => el.addEventListener('input', filter));
        loadMarket();
    </script>
</body>
</html>
