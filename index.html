<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wurm Hub | Community Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        
        /* 3D Product Card Styles */
        .market-card { 
            background: linear-gradient(180deg, #161616 0%, #0c0c0c 100%);
            border: 2px solid #222; 
            border-radius: 2rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .market-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* 3D Luminous Borders */
        .ql-common { border-color: #d4af37; box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.15), 0 0 20px rgba(212, 175, 55, 0.05); }
        .ql-rare { border-color: #3b82f6; box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.2), 0 0 20px rgba(59, 130, 246, 0.1); }
        .ql-supreme { border-color: #0ea5e9; box-shadow: inset 0 0 15px rgba(14, 165, 233, 0.2), 0 0 20px rgba(14, 165, 233, 0.1); }
        .ql-fantastic { border-color: #ec4899; box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.25), 0 0 25px rgba(236, 72, 153, 0.15); }

        .search-input { background: #111; border: 1px solid #222; color: white; padding: 0.6rem 1rem; border-radius: 0.75rem; outline: none; font-size: 0.75rem; width: 100%; }
        .search-input:focus { border-color: #d4af37; }
        
        .icon-header { 
            background: #1a1a1a; 
            border-radius: 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 54px; 
            height: 54px; 
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: -27px; 
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4">
            <a href="index.html" class="flex items-center gap-3 text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="shopping-bag" class="w-4 h-4 text-yellow-600"></i> Browse Market
            </a>
            <a href="dashboard.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Merchant Portal
            </a>
            <a href="login.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="log-in" class="w-4 h-4"></i> Sign In
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-16">
        <div class="max-w-7xl mx-auto">
            
            <div class="mb-20 grid grid-cols-1 md:grid-cols-4 gap-4 bg-[#141414] p-6 rounded-2xl border border-stone-900 shadow-2xl">
                <input type="text" id="search-item" class="search-input" placeholder="Product Name">
                <input type="text" id="search-seller" class="search-input" placeholder="Seller Name">
                <select id="search-category" class="search-input">
                    <option value="">All Categories</option>
                    <option value="Tools">Tools</option>
                    <option value="Armor">Armor</option>
                    <option value="Weapons">Weapons</option>
                    <option value="Resources">Resources</option>
                    <option value="Bred Animals">Bred Animals</option>
                </select>
                <select id="search-server" class="search-input">
                    <option value="">All Servers</option>
                    <option value="Cadence">Cadence</option>
                    <option value="Harmony">Harmony</option>
                    <option value="Melody">Melody</option>
                    <option value="Zenith">Zenith</option>
                </select>
            </div>

            <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-16 gap-x-8">
                </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const client = createClient('https://gjftmhvteylhtlwcouwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k');

        let allItems = [];

        async function loadMarket() {
            const { data: items, error } = await client.from('products').select(`*, profiles(character_name, server_name)`);
            if (error) return;
            allItems = items;
            renderMarket(allItems);
        }

        function getIcon(cat) {
            const map = { 'Tools': 'hammer', 'Armor': 'shield', 'Weapons': 'swords', 'Resources': 'box', 'Bred Animals': 'dog' };
            return map[cat] || 'package';
        }

        function renderMarket(items) {
            const container = document.getElementById('market-grid');
            container.innerHTML = items.map(item => {
                let qlClass = "ql-common";
                let qlColor = "text-[#d4af37]";
                if (item.base_ql >= 90) { qlClass = "ql-fantastic"; qlColor = "text-[#ec4899]"; }
                else if (item.base_ql >= 70) { qlClass = "ql-supreme"; qlColor = "text-[#0ea5e9]"; }
                else if (item.base_ql >= 50) { qlClass = "ql-rare"; qlColor = "text-[#3b82f6]"; }

                const price = [
                    item.price_g > 0 ? `<span class="text-yellow-500">${item.price_g}g</span>` : '',
                    item.price_s > 0 ? `<span class="text-stone-300">${item.price_s}s</span>` : '',
                    item.price_c > 0 ? `<span class="text-orange-600">${item.price_c}c</span>` : ''
                ].filter(p => p !== "").join(' ');

                return `
                <div class="market-card p-8 ${qlClass}">
                    <div class="icon-header ${qlColor}">
                        <i data-lucide="${getIcon(item.category)}" class="w-6 h-6"></i>
                    </div>

                    <h3 class="text-white font-black uppercase text-xl mb-3 tracking-tight">${item.item_name}</h3>
                    
                    <p class="text-[11px] text-stone-300 font-extrabold uppercase tracking-[0.15em] mb-8">
                        <span class="${qlColor}">QL ${item.base_ql}</span> 
                        <span class="mx-2 text-stone-700">•</span> 
                        ${item.profiles?.server_name || 'Global'}
                    </p>

                    <div class="font-mono text-2xl font-black mb-10">
                        ${price || '<span class="text-stone-800 text-sm italic">Taking Offers</span>'}
                    </div>

                    <div class="w-full pt-6 border-t border-stone-900/50 flex justify-between items-center mt-auto">
                        <div class="text-left">
                            <span class="block text-[8px] font-black text-stone-700 uppercase mb-1">Merchant</span>
                            <span class="text-[10px] font-black text-stone-400 uppercase tracking-tighter">${item.profiles?.character_name || 'Unknown'}</span>
                        </div>
                        <a href="merchant.html?id=${item.seller_id}" class="bg-stone-900 border border-stone-800 text-white text-[9px] font-black uppercase px-5 py-2.5 rounded-xl hover:bg-white hover:text-black transition-all">
                            View Shop
                        </a>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        const filter = () => {
            const i = document.getElementById('search-item').value.toLowerCase();
            const s = document.getElementById('search-seller').value.toLowerCase();
            const c = document.getElementById('search-category').value;
            const sv = document.getElementById('search-server').value;

            renderMarket(allItems.filter(item => 
                item.item_name.toLowerCase().includes(i) &&
                (item.profiles?.character_name || '').toLowerCase().includes(s) &&
                (c === "" || item.category === c) &&
                (sv === "" || item.profiles?.server_name === sv)
            ));
        };

        document.querySelectorAll('.search-input').forEach(el => el.addEventListener('input', filter));
        loadMarket();
    </script>
</body>
</html>
