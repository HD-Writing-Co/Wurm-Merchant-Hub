<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .dashboard-card { background: #141414; border: 1px solid #222; border-radius: 1.5rem; padding: 2rem; }
        .input-field { background: #0f0f0f; border: 1px solid #222; color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; outline: none; }
        .input-field:focus { border-color: #d4af37; }
        .gold-btn { background: #d4af37; color: black; font-weight: 800; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.3s; }
        .gold-btn:hover { background: #f4cf67; transform: translateY(-2px); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4">
            <a href="index.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Market
            </a>
            <button onclick="handleLogout()" class="flex items-center gap-3 text-red-900 hover:text-red-500 transition-all font-bold uppercase text-[10px] tracking-widest mt-10">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div class="max-w-5xl mx-auto">
            
            <section class="mb-12">
                <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2 uppercase tracking-tighter italic">
                    <i data-lucide="mail" class="w-5 h-5 text-yellow-600"></i> Customer Inquiries
                </h3>
                <div id="inquiry-list" class="grid grid-cols-1 gap-4">
                    <div class="p-8 border border-dashed border-stone-800 rounded-3xl text-stone-700 italic text-center text-sm">
                        No new inquiries found.
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1">
                    <div class="dashboard-card sticky top-10">
                        <h3 class="text-lg font-black text-white mb-6 uppercase italic">Add Listing</h3>
                        <form id="product-form" class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Item Name</label>
                                <input type="text" id="item_name" class="input-field" placeholder="e.g. Rare Small Chest" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Category</label>
                                <select id="category" class="input-field">
                                    <option value="Carpentry">Carpentry</option>
                                    <option value="Smithing">Smithing</option>
                                    <option value="Animal Husbandry">Animal Husbandry</option>
                                    <option value="Mining">Mining</option>
                                    <option value="Tailoring">Tailoring</option>
                                    <option value="Misc">Misc</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div><label class="text-[10px] font-black text-yellow-600 uppercase block mb-1">Gold</label><input type="number" id="price_g" class="input-field" value="0"></div>
                                <div><label class="text-[10px] font-black text-stone-400 uppercase block mb-1">Silver</label><input type="number" id="price_s" class="input-field" value="0"></div>
                                <div><label class="text-[10px] font-black text-orange-700 uppercase block mb-1">Copper</label><input type="number" id="price_c" class="input-field" value="0"></div>
                            </div>
                            <button type="submit" class="gold-btn w-full mt-4">Post Listing</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <h3 class="text-lg font-black text-white mb-6 uppercase italic">Your Active Listings</h3>
                    <div id="my-listings" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const _url = 'https://gjftmhvteylhtlwcouwg.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k';
        const client = createClient(_url, _key);

        async function initDashboard() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            loadInquiries(user.id);
            loadMyProducts(user.id);
            if (window.lucide) lucide.createIcons();
        }

        async function loadInquiries(userId) {
            const { data } = await client.from('inquiries').select('*').eq('seller_id', userId).order('created_at', {ascending: false});
            if (data && data.length > 0) {
                document.getElementById('inquiry-list').innerHTML = data.map(msg => `
                    <div class="p-6 bg-stone-900 border border-stone-800 rounded-3xl flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-black text-yellow-600 uppercase mb-1">Item: ${msg.item_name}</p>
                            <p class="text-white text-sm">"${msg.message}"</p>
                        </div>
                        <button onclick="deleteInquiry('${msg.id}')" class="text-stone-700 hover:text-red-500 p-2"><i data-lucide="trash-2"></i></button>
                    </div>`).join('');
                lucide.createIcons();
            }
        }

        async function loadMyProducts(userId) {
            const { data } = await client.from('products').select('*').eq('seller_id', userId);
            const grid = document.getElementById('my-listings');
            if (data) {
                grid.innerHTML = data.map(item => `
                    <div class="p-6 bg-[#111] border border-stone-900 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="text-white font-bold">${item.item_name}</p>
                            <p class="text-[10px] text-stone-600 uppercase font-black">${item.category}</p>
                        </div>
                        <button onclick="deleteProduct('${item.id}')" class="text-stone-800 hover:text-red-600 px-4 py-2 border border-stone-800 rounded-lg text-xs uppercase font-bold transition-all">Delete</button>
                    </div>`).join('');
            }
        }

        // --- Event Handlers ---
        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { user } } = await client.auth.getUser();
            const newItem = {
                seller_id: user.id,
                item_name: document.getElementById('item_name').value,
                category: document.getElementById('category').value,
                price_g: parseInt(document.getElementById('price_g').value),
                price_s: parseInt(document.getElementById('price_s').value),
                price_c: parseInt(document.getElementById('price_c').value)
            };
            const { error } = await client.from('products').insert([newItem]);
            if (!error) location.reload();
        };

        async function deleteInquiry(id) { if(confirm('Delete message?')) { await client.from('inquiries').delete().eq('id', id); location.reload(); }}
        async function deleteProduct(id) { if(confirm('Remove listing?')) { await client.from('products').delete().eq('id', id); location.reload(); }}
        async function handleLogout() { await client.auth.signOut(); window.location.href = 'index.html'; }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
