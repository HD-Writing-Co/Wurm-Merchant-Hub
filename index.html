<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wurm Hub | Global Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0f0f0f; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .gold-text { color: #d4af37; }
        .stat-card { background: #161616; border: 1px solid #262626; transition: all 0.3s ease; }
        .merchant-card { background: linear-gradient(145deg, #1a1a1a, #111111); border: 1px solid #262626; }
        .merchant-card:hover { border-color: #d4af37; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-3xl font-black gold-text italic tracking-tighter uppercase">Wurm Hub</h1>
        
        <div id="auth-status-area">
            <a href="login.html" class="flex items-center gap-4 group">
                <div class="p-3 border border-stone-800 rounded-full group-hover:border-yellow-600 transition-all">
                    <i data-lucide="log-in" class="w-5 h-5 text-stone-500 group-hover:text-yellow-500"></i>
                </div>
                <div>
                    <p class="text-white font-bold">Sign In</p>
                    <p class="text-stone-500 text-[10px] uppercase font-black">Manage Inventory</p>
                </div>
            </a>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-8 py-12 border-y border-stone-900 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="stat-card p-8 rounded-2xl">
            <p class="text-[10px] font-black text-stone-600 uppercase tracking-[0.2em] mb-2">Total Listings</p>
            <h2 id="total-listings-count" class="text-5xl font-black text-white italic">0</h2>
        </div>
        <div class="stat-card p-8 rounded-2xl">
            <p class="text-[10px] font-black text-stone-600 uppercase tracking-[0.2em] mb-2">Active Sellers</p>
            <h2 id="active-sellers-count" class="text-5xl font-black text-white italic">0</h2>
        </div>
        <div class="stat-card p-8 rounded-2xl">
            <p class="text-[10px] font-black text-stone-600 uppercase tracking-[0.2em] mb-2">Connected Servers</p>
            <h2 class="text-5xl font-black text-yellow-600 italic">1</h2>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h2 class="text-xs font-black text-yellow-600 uppercase tracking-[0.3em] mb-2">Verified Merchants</h2>
                <h3 class="text-4xl font-bold text-white tracking-tighter">Current Market Listings</h3>
            </div>
        </div>

        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-stone-700 animate-pulse uppercase font-black tracking-widest text-xs">
                Scanning Wurm Network...
            </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const _url = 'https://gjftmhvteylhtlwcouwg.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k';
        const client = createClient(_url, _key);

        // Map categories to Lucide icons
        const categoryIcons = {
            'Carpentry': 'hammer',
            'Mining': 'pickaxe',
            'Smithing': 'anvil',
            'Masonry': 'bricks',
            'Cooking': 'utensils',
            'Tailoring': 'scissors',
            'Farming': 'wheat',
            'Misc': 'box'
        };

        async function initFrontPage() {
            // 1. Check Auth for Header
            const { data: { user } } = await client.auth.getUser();
            if (user) {
                document.getElementById('auth-status-area').innerHTML = `
                    <a href="dashboard.html" class="flex items-center gap-4 group">
                        <div class="p-3 border border-green-900/30 rounded-full bg-green-900/10 group-hover:border-green-500 transition-all">
                            <i data-lucide="layout-dashboard" class="w-5 h-5 text-green-500"></i>
                        </div>
                        <div>
                            <p class="text-white font-bold uppercase tracking-tighter">Dashboard</p>
                            <p class="text-green-600 text-[10px] font-black uppercase">Online</p>
                        </div>
                    </a>`;
            }

            // 2. Fetch Stats & Products
            const { data: products, error } = await client.from('products').select('*');
            if (error) return;

            // Update Stat Numbers
            document.getElementById('total-listings-count').innerText = products.length;
            const uniqueSellers = new Set(products.map(p => p.seller_id)).size;
            document.getElementById('active-sellers-count').innerText = uniqueSellers;

            renderMarket(products);
        }

        async function renderMarket(products) {
            const grid = document.getElementById('market-grid');
            if (!products || products.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-stone-600 italic">No items currently for sale.</p>`;
                return;
            }

            // Get profile names for the cards
            const { data: profiles } = await client.from('profiles').select('id, character_name, server_name');
            const profileMap = Object.fromEntries(profiles.map(p => [p.id, p]));

            grid.innerHTML = products.map(item => {
                const profile = profileMap[item.seller_id] || { character_name: 'Unknown', server_name: 'Unknown' };
                const icon = categoryIcons[item.category] || 'package';
                
                return `
                    <a href="merchant.html?id=${item.seller_id}" class="merchant-card rounded-2xl p-6 group">
                        <div class="flex justify-between items-start mb-8">
                            <div class="p-4 bg-stone-900 rounded-xl border border-stone-800 group-hover:border-yellow-600/50 transition-colors">
                                <i data-lucide="${icon}" class="w-8 h-8 text-stone-600 group-hover:text-yellow-500 transition-colors"></i>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] font-black text-yellow-700 uppercase tracking-widest">${item.category}</span>
                                <h4 class="text-white font-bold">${item.item_name}</h4>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-end border-t border-stone-800/50 pt-4">
                            <div>
                                <p class="text-[8px] font-black text-stone-600 uppercase mb-1">Seller</p>
                                <p class="text-sm font-bold text-stone-300 uppercase italic tracking-tighter">${profile.character_name}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] font-black text-stone-600 uppercase mb-1">Price</p>
                                <p class="text-lg font-black text-white italic">${item.price_g}g ${item.price_s}s</p>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');

            if (window.lucide) lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', initFrontPage);
    </script>
</body>
</html>
