<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wurm Hub | Community Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .market-card { background: #141414; border: 1px solid #222; transition: all 0.3s; border-radius: 1.5rem; }
        .market-card:hover { border-color: #d4af37; transform: translateY(-2px); }
        .search-input { background: #111; border: 1px solid #222; color: white; padding: 0.5rem 1rem; border-radius: 0.75rem; outline: none; font-size: 0.75rem; width: 100%; }
        .search-input:focus { border-color: #d4af37; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4">
            <a href="dashboard.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Merchant Portal
            </a>
            <a href="login.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="log-in" class="w-4 h-4"></i> Sign In
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div class="max-w-7xl mx-auto">
            
            <div class="mb-12 grid grid-cols-1 md:grid-cols-4 gap-4 bg-[#141414] p-6 rounded-2xl border border-stone-900">
                <input type="text" id="search-item" class="search-input" placeholder="Search Product...">
                <input type="text" id="search-seller" class="search-input" placeholder="Search Seller...">
                <select id="search-category" class="search-input">
                    <option value="">All Categories</option>
                    <option value="Tools">Tools</option>
                    <option value="Armor">Armor</option>
                    <option value="Weapons">Weapons</option>
                    <option value="Carpentry">Carpentry</option>
                    <option value="Smithing">Smithing</option>
                </select>
                <select id="search-server" class="search-input">
                    <option value="">All Servers</option>
                    <option value="Cadence">Cadence</option>
                    <option value="Harmony">Harmony</option>
                    <option value="Melody">Melody</option>
                    <option value="Zenith">Zenith</option>
                </select>
            </div>

            <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const client = createClient('https://gjftmhvteylhtlwcouwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k');

        let allItems = [];

        async function loadMarket() {
            const { data: items, error } = await client.from('products').select(`*, profiles(character_name, server_name)`);
            if (error) { console.error(error); return; }
            
            allItems = items;
            renderMarket(allItems);
        }

        function renderMarket(items) {
            const container = document.getElementById('market-grid');
            container.innerHTML = items.map(item => `
                <div class="market-card p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-white font-black uppercase text-lg">${item.item_name}</h3>
                            <p class="text-[10px] text-stone-600 font-bold uppercase tracking-widest">QL ${item.base_ql} • ${item.profiles?.server_name || 'Global'}</p>
                        </div>
                        <div class="text-right font-mono text-xs text-yellow-500">
                            ${item.price_g}g ${item.price_s}s ${item.price_c}c
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-6 pt-4 border-t border-stone-900/50">
                        <a href="merchant.html?id=${item.seller_id}" class="flex items-center gap-2 group">
                            <span class="text-[10px] font-black uppercase text-stone-500 group-hover:text-white transition-all">
                                ${item.profiles?.character_name || 'Visit Shop'}
                            </span>
                        </a>
                        <a href="merchant.html?id=${item.seller_id}" class="text-[10px] font-black uppercase bg-stone-900 px-4 py-2 rounded-lg hover:bg-white hover:text-black transition-all">View Details</a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        const filterItems = () => {
            const itemQuery = document.getElementById('search-item').value.toLowerCase();
            const sellerQuery = document.getElementById('search-seller').value.toLowerCase();
            const catQuery = document.getElementById('search-category').value;
            const serverQuery = document.getElementById('search-server').value;

            const filtered = allItems.filter(item => {
                const matchItem = item.item_name.toLowerCase().includes(itemQuery);
                const matchSeller = (item.profiles?.character_name || '').toLowerCase().includes(sellerQuery);
                const matchCat = catQuery === "" || item.category === catQuery;
                const matchServer = serverQuery === "" || (item.profiles?.server_name || '') === serverQuery;
                return matchItem && matchSeller && matchCat && matchServer;
            });
            renderMarket(filtered);
        };

        document.getElementById('search-item').oninput = filterItems;
        document.getElementById('search-seller').oninput = filterItems;
        document.getElementById('search-category').onchange = filterItems;
        document.getElementById('search-server').onchange = filterItems;

        loadMarket();
    </script>
</body>
</html>
