<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Profile | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        
        /* 3D Product Card Styles - Matching Index */
        .market-card { 
            background: linear-gradient(180deg, #161616 0%, #0c0c0c 100%);
            border: 2px solid #222; 
            border-radius: 2rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        /* 3D Luminous Borders */
        .ql-common { border-color: #d4af37; box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.15); }
        .ql-rare { border-color: #3b82f6; box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.2); }
        .ql-supreme { border-color: #0ea5e9; box-shadow: inset 0 0 15px rgba(14, 165, 233, 0.2); }
        .ql-fantastic { border-color: #ec4899; box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.25); }

        .icon-header { 
            background: #1a1a1a; border-radius: 1rem; display: flex; align-items: center; 
            justify-content: center; width: 54px; height: 54px; border: 1px solid rgba(255,255,255,0.05);
            margin-top: -27px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Inquiry Button Styling */
        .inquiry-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: #1a1a1a; border: 1px solid #333; color: #888;
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .inquiry-btn:hover { background: white; color: black; border-color: white; transform: scale(1.1); }

        /* Modal Blur */
        #inquiry-modal { backdrop-filter: blur(8px); background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4">
            <a href="index.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i> Browse Market
            </a>
            <a href="dashboard.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Merchant Portal
            </a>
        </nav>
        
        <div class="mt-auto pt-10 border-t border-stone-900">
            <h2 id="merchant-name" class="text-white font-black uppercase text-xl mb-1">Loading...</h2>
            <p id="merchant-server" class="text-yellow-600 text-[10px] font-black uppercase tracking-widest mb-4"></p>
            <p id="merchant-bio" class="text-stone-500 text-xs leading-relaxed italic"></p>
        </div>
    </aside>

    <main class="flex-1 p-16">
        <div class="max-w-7xl mx-auto">
            <div id="merchant-inventory" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-16 gap-x-8">
                </div>
        </div>
    </main>

    <div id="inquiry-modal" class="fixed inset-0 hidden flex items-center justify-center z-50 p-6">
        <div class="bg-[#111] border border-stone-800 p-8 rounded-3xl max-w-md w-full shadow-2xl">
            <h2 id="modal-title" class="text-white font-black uppercase text-xl mb-2">Inquiry</h2>
            <p id="modal-item-name" class="text-stone-500 text-[10px] font-bold uppercase tracking-widest mb-6"></p>
            
            <input type="text" id="sender-name" placeholder="Your Character Name" class="w-full bg-stone-900 border border-stone-800 rounded-xl p-3 text-sm text-white mb-4 outline-none focus:border-yellow-600">
            <textarea id="message-body" rows="4" placeholder="Your message or offer..." class="w-full bg-stone-900 border border-stone-800 rounded-xl p-3 text-sm text-white mb-6 outline-none focus:border-yellow-600"></textarea>
            
            <div class="flex gap-4">
                <button onclick="closeInquiry()" class="flex-1 px-6 py-3 rounded-xl bg-stone-900 text-stone-500 text-[10px] font-black uppercase hover:text-white transition-all">Cancel</button>
                <button onclick="sendInquiry()" class="flex-1 px-6 py-3 rounded-xl bg-yellow-600 text-black text-[10px] font-black uppercase hover:bg-white transition-all">Send Inquiry</button>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const client = createClient('https://gjftmhvteylhtlwcouwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k');

        const params = new URLSearchParams(window.location.search);
        const merchantId = params.get('id');
        let activeItem = null;

        async function init() {
            if (!merchantId) { window.location.href = 'index.html'; return; }
            
            // Load Profile
            const { data: profile } = await client.from('profiles').select('*').eq('id', merchantId).single();
            if (profile) {
                document.getElementById('merchant-name').innerText = profile.character_name;
                document.getElementById('merchant-server').innerText = profile.server_name;
                document.getElementById('merchant-bio').innerText = profile.bio || "No description provided.";
            }

            // Load Items
            const { data: items } = await client.from('products').select('*').eq('seller_id', merchantId);
            renderInventory(items || []);
        }

        function getIcon(cat) {
            const map = { 'Tools': 'hammer', 'Armor': 'shield', 'Weapons': 'swords', 'Resources': 'box', 'Bred Animals': 'dog' };
            return map[cat] || 'package';
        }

        function renderInventory(items) {
            const container = document.getElementById('merchant-inventory');
            container.innerHTML = items.map(item => {
                let qlClass = "ql-common";
                let qlColor = "text-[#d4af37]";
                if (item.base_ql >= 90) { qlClass = "ql-fantastic"; qlColor = "text-[#ec4899]"; }
                else if (item.base_ql >= 70) { qlClass = "ql-supreme"; qlColor = "text-[#0ea5e9]"; }
                else if (item.base_ql >= 50) { qlClass = "ql-rare"; qlColor = "text-[#3b82f6]"; }

                const price = [
                    item.price_g > 0 ? `<span class="text-yellow-500">${item.price_g}g</span>` : '',
                    item.price_s > 0 ? `<span class="text-stone-300">${item.price_s}s</span>` : '',
                    item.price_c > 0 ? `<span class="text-orange-600">${item.price_c}c</span>` : ''
                ].filter(p => p !== "").join(' ');

                return `
                <div class="market-card p-8 ${qlClass}">
                    <div class="icon-header ${qlColor}">
                        <i data-lucide="${getIcon(item.category)}" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-white font-black uppercase text-xl mb-3 tracking-tight">${item.item_name}</h3>
                    <p class="text-[11px] text-stone-300 font-extrabold uppercase tracking-[0.15em] mb-8">
                        <span class="${qlColor}">QL ${item.base_ql}</span>
                    </p>
                    <div class="font-mono text-2xl font-black mb-4">
                        ${price || '<span class="text-stone-800 text-sm italic">Taking Offers</span>'}
                    </div>
                    
                    <button onclick="openInquiry('${item.item_name}', '${item.id}')" class="inquiry-btn">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </button>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        window.openInquiry = (itemName, itemId) => {
            activeItem = { id: itemId, name: itemName };
            document.getElementById('modal-item-name').innerText = `Regarding: ${itemName}`;
            document.getElementById('inquiry-modal').classList.remove('hidden');
        };

        window.closeInquiry = () => {
            document.getElementById('inquiry-modal').classList.add('hidden');
        };

        window.sendInquiry = async () => {
            const sender = document.getElementById('sender-name').value;
            const message = document.getElementById('message-body').value;

            if (!sender || !message) { alert("Please fill in both fields."); return; }

            const { error } = await client.from('inquiries').insert([{
                seller_id: merchantId,
                product_id: activeItem.id,
                sender_name: sender,
                message: `[Item: ${activeItem.name}] - ${message}`
            }]);

            if (!error) {
                alert("Inquiry sent to merchant!");
                closeInquiry();
            } else {
                alert("Error sending inquiry: " + error.message);
            }
        };

        init();
    </script>
</body>
</html>
