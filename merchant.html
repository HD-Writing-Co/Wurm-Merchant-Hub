<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Shop | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .shop-card { background: #141414; border: 1px solid #222; border-radius: 1.5rem; padding: 2rem; }
        .input-field { background: #0f0f0f; border: 1px solid #222; color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; outline: none; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body class="p-10 md:p-20">
    <div class="max-w-5xl mx-auto">
        <a href="index.html" class="text-3xl font-black italic text-white mb-16 uppercase tracking-tighter inline-block hover:opacity-80 transition-all">
            WURM <span class="text-yellow-600">HUB</span>
        </a>

        <div id="profile-header" class="mb-12 border-l-4 border-yellow-600 pl-8">
            <h1 id="m_name" class="text-5xl font-black italic text-white uppercase tracking-tighter">Merchant</h1>
            <div class="flex items-center mt-2">
                <div id="status-ticker" class="text-[10px] font-bold uppercase tracking-widest text-stone-500 flex items-center mr-4">
                    <span class="status-dot bg-stone-700"></span> Checking Status
                </div>
                <p id="m_server" class="text-yellow-600 font-bold uppercase tracking-widest text-sm"></p>
            </div>
            <p id="m_bio" class="text-stone-400 mt-6 max-w-2xl leading-relaxed italic">Loading bio...</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="md:col-span-2 space-y-4">
                <h3 class="text-lg font-black text-white uppercase italic mb-6">Current Stock</h3>
                <div id="product-list" class="space-y-3"></div>
            </div>

            <div class="md:col-span-1">
                <div class="shop-card sticky top-10">
                    <h3 class="text-lg font-black text-white mb-6 uppercase italic">Send Inquiry</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-black text-stone-600 uppercase mb-1 block">In-Game Name</label>
                            <input type="text" id="buyer_name" class="input-field" placeholder="Character Name">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] font-black text-stone-600 uppercase mb-1 block">Timezone</label>
                                <input type="text" id="buyer_tz" class="input-field" placeholder="EST/UTC">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-stone-600 uppercase mb-1 block">Best Time</label>
                                <input type="text" id="buyer_time" class="input-field" placeholder="Evens/8pm">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-stone-600 uppercase mb-1 block">Message</label>
                            <textarea id="buyer_message" class="input-field h-32" maxlength="255" placeholder="Include item name and details..."></textarea>
                            <p id="char-count" class="text-[9px] text-stone-700 italic mt-1 text-right">0/255</p>
                        </div>
                    </div>
                    <button onclick="sendMessage()" class="w-full bg-yellow-600 text-black font-black p-4 mt-4 rounded-xl hover:bg-yellow-500 transition-all uppercase tracking-widest text-[10px]">Send Message</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const client = createClient('https://gjftmhvteylhtlwcouwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k');
        
        const params = new URLSearchParams(window.location.search);
        const merchantId = params.get('id') || params.get('merchant'); 

        async function init() {
            if (!merchantId) return;

            const { data: prof } = await client.from('profiles').select('*').eq('id', merchantId).single();
            if (prof) {
                document.getElementById('m_name').innerText = prof.character_name || "Merchant";
                document.getElementById('m_server').innerText = prof.server_name || "";
                document.getElementById('m_bio').innerText = prof.bio || "No bio available.";

                // Online Status Pulse Logic
                const lastSeen = new Date(prof.updated_at);
                const isOnline = (new Date() - lastSeen) < 300000; 
                document.getElementById('status-ticker').innerHTML = isOnline ? 
                    `<span class="status-dot bg-green-500 shadow-[0_0_8px_#22c55e]"></span> Online` : 
                    `<span class="status-dot bg-red-600"></span> Offline`;
            }

            const { data: items } = await client.from('products').select('*').eq('seller_id', merchantId);
            const container = document.getElementById('product-list');
            
            if (items) {
                container.innerHTML = items.map(item => `
                    <div class="p-6 bg-[#111] border border-stone-900 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="text-white font-bold uppercase">${item.item_name}</p>
                            <p class="text-[10px] text-stone-600 font-bold uppercase tracking-widest">QL ${item.base_ql} • Qty: ${item.quantity}</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="font-mono text-xs text-yellow-500">
                                ${item.price_g}g ${item.price_s}s ${item.price_c}c
                            </div>
                            <button onclick="focusMessage('${item.item_name}')" class="text-stone-700 hover:text-yellow-600 transition-colors">
                                <i data-lucide="mail" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>`).join('');
            }
            lucide.createIcons();
        }

        window.focusMessage = (itemName) => {
            document.getElementById('buyer_message').value = "Hi! I'm interested in: " + itemName + ". ";
            document.getElementById('buyer_name').focus();
        };

        document.getElementById('buyer_message').oninput = function() {
            document.getElementById('char-count').innerText = this.value.length + "/255";
        };

        window.sendMessage = async () => {
            const charName = document.getElementById('buyer_name').value;
            const tz = document.getElementById('buyer_tz').value;
            const time = document.getElementById('buyer_time').value;
            const msg = document.getElementById('buyer_message').value;

            if (!charName || !msg) { alert("Name and Message required."); return; }

            const fullMessage = `Name: ${charName}\nTZ: ${tz} | Best Catch: ${time}\n\n${msg}`;

            const { error } = await client.from('inquiries').insert([{
                seller_id: merchantId,
                sender_name: charName,
                message: fullMessage
            }]);

            if (error) alert(error.message);
            else { alert("Inquiry sent!"); location.reload(); }
        };

        init();
    </script>
</body>
</html>
