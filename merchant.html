<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Profile | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .wurm-card {
            background: #141414;
            border: 1px solid #222;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .wurm-card:hover {
            border-color: #d4af37;
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .gold-text { color: #d4af37; }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black gold-text italic mb-8 uppercase tracking-tighter">Wurm Hub</h1>
        <a href="index.html" class="flex items-center gap-2 text-xs font-bold text-stone-500 hover:text-yellow-500 transition-colors mb-12 uppercase tracking-widest">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Market
        </a>
        
        <div id="merchant-sidebar-info" class="space-y-4">
            <h2 id="merchant-name" class="text-3xl font-black text-white uppercase italic tracking-tighter leading-tight">Loading...</h2>
            <div id="merchant-server" class="text-yellow-600 text-[10px] font-black uppercase tracking-widest bg-yellow-900/20 px-2 py-1 inline-block rounded border border-yellow-700/30">Server</div>
            <p id="merchant-bio" class="text-stone-500 text-sm italic leading-relaxed pt-4 border-t border-stone-800">Retrieving bio...</p>
        </div>
    </aside>

    <main class="flex-1 p-12">
        <div class="max-w-5xl mx-auto">
            <div class="mb-12">
                <div class="inline-block bg-stone-900/30 p-6 rounded-3xl border border-stone-800">
                    <p class="text-[10px] font-black text-stone-600 uppercase mb-1 tracking-widest">Active Listings</p>
                    <h3 id="stat-count" class="text-4xl font-black text-white italic">0</h3>
                </div>
            </div>

            <div id="merchant-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const _url = 'https://gjftmhvteylhtlwcouwg.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k';
        const client = createClient(_url, _key);

        const iconMap = {
            'Carpentry': 'hammer', 'Smithing': 'anvil', 'Mining': 'pickaxe', 'Masonry': 'bricks',
            'Tailoring': 'scissors', 'Farming': 'wheat', 'Cooking': 'utensils', 'Jewelry': 'gem',
            'Alchemy': 'flask-conical', 'Shipbuilding': 'ship', 'Animal Husbandry': 'horse', 'Misc': 'box'
        };

        async function init() {
            const sellerId = new URLSearchParams(window.location.search).get('id');
            if (!sellerId) return;

            const { data: prof } = await client.from('profiles').select('*').eq('id', sellerId).single();
            if (prof) {
                document.getElementById('merchant-name').innerText = prof.character_name;
                document.getElementById('merchant-server').innerText = prof.server_name;
                document.getElementById('merchant-bio').innerText = prof.bio || "No description.";
            }

            const { data: products } = await client.from('products').select('*').eq('seller_id', sellerId);
            if (products) {
                document.getElementById('stat-count').innerText = products.length;
                renderGrid(products, prof?.character_name, prof?.server_name);
            }
        }

        function renderGrid(products, seller, server) {
            const grid = document.getElementById('merchant-grid');
            grid.innerHTML = products.map(item => {
                // Smart Price Logic
                let pStr = "";
                let pHtml = "";
                if (item.price_g > 0) { pStr += `${item.price_g}g `; pHtml += `<span class="text-yellow-500">${item.price_g}g</span> `; }
                if (item.price_s > 0) { pStr += `${item.price_s}s `; pHtml += `<span class="text-stone-300">${item.price_s}s</span> `; }
                if (item.price_c > 0 || pStr === "") { pStr += `${item.price_c}c`; pHtml += `<span class="text-orange-700">${item.price_c}c</span>`; }

                const icon = iconMap[item.category] || 'box';

                return `
                    <div class="wurm-card rounded-3xl p-8 flex flex-col justify-between min-h-[340px]">
                        <div>
                            <div class="flex justify-between items-start mb-8">
                                <div class="w-14 h-14 rounded-2xl bg-stone-900 border border-stone-800 flex items-center justify-center text-stone-500 shadow-inner"><i data-lucide="${icon}" class="w-7 h-7"></i></div>
                                <button onclick="copyTell('${seller}', '${item.item_name}', '${pStr}', '${server}')" class="px-4 py-2 bg-yellow-600/10 hover:bg-yellow-600 text-yellow-600 hover:text-black rounded-xl border border-yellow-600/20 transition-all font-bold text-[10px] uppercase">
                                    <i data-lucide="copy" class="w-4 h-4 inline mr-1"></i> Copy Tell
                                </button>
                            </div>
                            <span class="text-[10px] font-black uppercase text-yellow-600 tracking-[0.3em] mb-2 block">${item.category}</span>
                            <h4 class="text-white font-extrabold text-2xl mb-4">${item.item_name}</h4>
                            <div class="flex gap-2">
                                <div class="px-3 py-1 bg-black rounded border border-stone-800 text-[10px] text-stone-500 font-black">QL: <span class="text-yellow-500">${item.base_ql || '??'}</span></div>
                                <div class="px-3 py-1 bg-black rounded border border-stone-800 text-[10px] text-stone-500 font-black">STOCK: <span class="text-white">${item.quantity || '1'}</span></div>
                            </div>
                        </div>
                        <div class="mt-10 pt-6 border-t border-stone-900/50 flex justify-between items-center">
                            <div><p class="text-[9px] font-black text-stone-700 uppercase mb-1 tracking-widest">Price</p><div class="text-2xl font-black italic tracking-tighter">${pHtml}</div></div>
                            <button onclick="sendOfflineMessage('${item.seller_id}', '${item.item_name}')" class="p-4 bg-stone-900 hover:bg-stone-800 text-stone-500 rounded-2xl border border-stone-800 transition-colors"><i data-lucide="mail" class="w-5 h-5"></i></button>
                        </div>
                    </div>`;
            }).join('');
            if (window.lucide) lucide.createIcons();
        }

        window.copyTell = (seller, item, price, server) => {
            navigator.clipboard.writeText(`/tell ${seller} wtb ${item} for ${price} on ${server}`);
            alert("Tell command copied!");
        };

        window.sendOfflineMessage = async (sellerId, itemName) => {
            const msg = prompt(`Merchant might be offline. Leave a message for the ${itemName}:`);
            if (msg) {
                const { error } = await client.from('inquiries').insert([{ seller_id: sellerId, item_name: itemName, message: msg }]);
                if (!error) alert("Message sent to merchant dashboard!");
                else alert("Error sending message. Ensure the SQL table was created.");
            }
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
