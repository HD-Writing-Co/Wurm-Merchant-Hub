<script>
    // ... Supabase Init ...

    function renderMerchantGrid(products, sellerName, serverName) {
        const grid = document.getElementById('merchant-grid');
        grid.innerHTML = products.map(item => {
            let priceText = ""; // Plain text for clipboard
            let priceHtml = ""; // Styled HTML for card
            if (item.price_g > 0) { priceText += `${item.price_g}g `; priceHtml += `<span class="text-yellow-500">${item.price_g}g</span> `; }
            if (item.price_s > 0) { priceText += `${item.price_s}s `; priceHtml += `<span class="text-stone-300">${item.price_s}s</span> `; }
            if (item.price_c > 0 || priceText === "") { priceText += `${item.price_c}c`; priceHtml += `<span class="text-orange-700">${item.price_c}c</span>`; }

            return `
                <div class="wurm-card rounded-3xl p-8 flex flex-col justify-between min-h-[320px]">
                    <div>
                        <div class="flex justify-between mb-6">
                            <div class="w-14 h-14 rounded-2xl bg-stone-900 border border-stone-800 flex items-center justify-center text-stone-500"><i data-lucide="${iconMap[item.category] || 'box'}" class="w-7 h-7"></i></div>
                            <button onclick="copyTell('${sellerName}', '${item.item_name}', '${priceText}')" class="flex items-center gap-2 px-4 py-2 bg-yellow-600/10 hover:bg-yellow-600 text-yellow-600 hover:text-black rounded-xl border border-yellow-600/20 transition-all font-bold text-[10px] uppercase">
                                <i data-lucide="copy" class="w-4 h-4"></i> Copy Tell
                            </button>
                        </div>
                        <h4 class="text-white font-extrabold text-2xl mb-4">${item.item_name}</h4>
                        <div class="flex gap-2">
                            <div class="px-3 py-1 bg-black rounded border border-stone-800 text-[10px] text-stone-500 uppercase font-black">QL: <span class="text-yellow-500">${item.base_ql || '??'}</span></div>
                        </div>
                    </div>
                    <div class="mt-10 pt-6 border-t border-stone-900 flex justify-between items-center">
                        <div class="text-2xl font-black italic tracking-tighter">${priceHtml}</div>
                        <button onclick="sendOfflineMessage('${item.seller_id}', '${item.item_name}')" class="p-4 bg-stone-900 hover:bg-stone-800 text-stone-500 rounded-2xl border border-stone-800"><i data-lucide="mail" class="w-5 h-5"></i></button>
                    </div>
                </div>`;
        }).join('');
    }

    window.copyTell = (seller, item, price) => {
        const cmd = `/tell ${seller} wtb ${item} for ${price}`;
        navigator.clipboard.writeText(cmd);
        alert("Wurm command copied to clipboard!");
    };

    window.sendOfflineMessage = async (sellerId, itemName) => {
        const msg = prompt(`The merchant might be offline. Leave a message about the ${itemName}:`);
        if (msg) {
            const { error } = await client.from('inquiries').insert([{ 
                seller_id: sellerId, 
                item_name: itemName, 
                message: msg,
                created_at: new Date()
            }]);
            if (!error) alert("Message sent to merchant's dashboard!");
        }
    };
</script>
