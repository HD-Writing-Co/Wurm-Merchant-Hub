<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .dashboard-card { background: #141414; border: 1px solid #222; border-radius: 1.5rem; padding: 2rem; }
        .input-field { background: #0f0f0f; border: 1px solid #222; color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; outline: none; font-size: 0.875rem; }
        .input-field:focus { border-color: #d4af37; }
        .gold-btn { background: #d4af37; color: black; font-weight: 800; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.3s; cursor: pointer; }
        .gold-btn:hover { background: #f4cf67; transform: translateY(-2px); }
        .message-pill { background: #1a1a1a; border-left: 4px solid #d4af37; transition: all 0.2s; }
        .message-pill:hover { background: #222; }
        #message-container::-webkit-scrollbar { width: 4px; }
        #message-container::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4">
            <a href="index.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Market
            </a>
            <button onclick="handleLogout()" class="flex items-center gap-3 text-red-900 hover:text-red-500 transition-all font-bold uppercase text-[10px] tracking-widest mt-10">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <section class="mb-10 dashboard-card">
                <h3 class="text-lg font-black text-white mb-6 uppercase italic">Merchant Profile Settings</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Character Name</label>
                        <input type="text" id="prof_name" class="input-field" placeholder="Character Name">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Server</label>
                        <select id="prof_server" class="input-field">
                            <option value="Cadence">Cadence</option>
                            <option value="Harmony">Harmony</option>
                            <option value="Melody">Melody</option>
                            <option value="Pristine">Pristine</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Bio</label>
                        <input type="text" id="prof_bio" class="input-field" placeholder="Describe your shop...">
                    </div>
                    <div class="flex items-end">
                        <button onclick="updateProfile()" class="gold-btn w-full">Save Changes</button>
                    </div>
                </div>
            </section>

            <section class="mb-10 dashboard-card">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black text-white uppercase italic">Customer Inquiries</h3>
                    <span id="msg-count" class="bg-yellow-600 text-black text-[10px] font-black px-2 py-0.5 rounded-full">0 New</span>
                </div>
                <div id="message-container" class="space-y-4 max-h-64 overflow-y-auto pr-2">
                    <p class="text-stone-700 italic text-sm">Loading messages...</p>
                </div>
            </section>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1">
                    <div id="form-container" class="dashboard-card sticky top-10">
                        <h3 id="form-title" class="text-lg font-black text-white mb-6 uppercase italic">Add New Listing</h3>
                        <form id="product-form" class="space-y-4">
                            <input type="hidden" id="edit-id">
                            
                            <div>
                                <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Item Name</label>
                                <input type="text" id="item_name" class="input-field" placeholder="e.g. Small Chest" required>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Quality (QL)</label>
                                    <input type="number" id="base_ql" class="input-field" value="50" step="0.1">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Quantity</label>
                                    <input type="text" id="quantity" class="input-field" value="1">
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Category</label>
                                <select id="category" class="input-field">
                                    <optgroup label="Crafting">
                                        <option value="Carpentry">Carpentry</option>
                                        <option value="Smithing">Smithing</option>
                                        <option value="Masonry">Masonry</option>
                                        <option value="Tailoring">Tailoring</option>
                                        <option value="Leatherworking">Leatherworking</option>
                                        <option value="Jewelry">Jewelry</option>
                                        <option value="Pottery">Pottery</option>
                                    </optgroup>
                                    <optgroup label="Equipment">
                                        <option value="Armor">Armor</option>
                                        <option value="Weapons">Weapons</option>
                                        <option value="Tools">Tools</option>
                                        <option value="Ships">Ships / Marine</option>
                                    </optgroup>
                                    <optgroup label="Nature">
                                        <option value="Animal Husbandry">Animal Husbandry</option>
                                        <option value="Farming">Farming / Seeds</option>
                                        <option value="Cooking">Cooking / Food</option>
                                        <option value="Alchemy">Alchemy / Potions</option>
                                    </optgroup>
                                    <option value="Misc">Miscellaneous / Rifts</option>
                                </select>
                            </div>

                            <label class="text-[10px] font-black text-stone-600 uppercase block">Pricing</label>
                            <div class="grid grid-cols-4 gap-1">
                                <div><span class="text-[9px] text-yellow-500 uppercase font-black ml-1">Gold</span><input type="number" id="price_g" class="input-field !p-2" value="0"></div>
                                <div><span class="text-[9px] text-stone-400 uppercase font-black ml-1">Silv</span><input type="number" id="price_s" class="input-field !p-2" value="0"></div>
                                <div><span class="text-[9px] text-orange-700 uppercase font-black ml-1">Copp</span><input type="number" id="price_c" class="input-field !p-2" value="0"></div>
                                <div><span class="text-[9px] text-stone-600 uppercase font-black ml-1">Iron</span><input type="number" id="price_i" class="input-field !p-2" value="0"></div>
                            </div>

                            <button type="submit" id="submit-btn" class="gold-btn w-full">Post Listing</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <h3 class="text-lg font-black text-white mb-6 uppercase italic">Active Inventory</h3>
                    <div id="my-listings" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const _url = 'https://gjftmhvteylhtlwcouwg.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k';
        const client = createClient(_url, _key);

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            const { data: profile } = await client.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (profile) {
                document.getElementById('prof_name').value = profile.character_name || "";
                document.getElementById('prof_server').value = profile.server_name || "Cadence";
                document.getElementById('prof_bio').value = profile.bio || "";
            }
            loadMyProducts(user.id);
            loadMessages(user.id);
        }

        async function loadMessages(userId) {
            const { data } = await client.from('inquiries').select('*').eq('seller_id', userId).order('created_at', { ascending: false });
            const container = document.getElementById('message-container');
            const countBadge = document.getElementById('msg-count');

            if (!data || data.length === 0) {
                container.innerHTML = `<p class="text-stone-700 italic text-sm">No new messages.</p>`;
                countBadge.innerText = "0 New";
                return;
            }

            countBadge.innerText = `${data.length} Total`;
            container.innerHTML = data.map(msg => `
                <div class="p-4 rounded-xl message-pill flex justify-between items-start group">
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-xs font-bold text-yellow-600 uppercase tracking-tighter">${msg.sender_name}</span>
                            <span class="text-[9px] text-stone-600 font-mono">${new Date(msg.created_at).toLocaleDateString()}</span>
                        </div>
                        <p class="text-stone-300 text-sm leading-relaxed">${msg.message}</p>
                    </div>
                    <button onclick="deleteMessage('${msg.id}')" class="ml-4 p-2 text-stone-700 hover:text-red-500 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Explicitly exposing functions to the window for onclick events
        window.deleteMessage = async (id) => {
            if (confirm('Permanently delete this inquiry?')) {
                const { error } = await client.from('inquiries').delete().eq('id', id);
                if (!error) {
                    const { data: { user } } = await client.auth.getUser();
                    loadMessages(user.id);
                }
            }
        };

        window.updateProfile = async () => {
            const { data: { user } } = await client.auth.getUser();
            await client.from('profiles').upsert({
                id: user.id,
                character_name: document.getElementById('prof_name').value,
                server_name: document.getElementById('prof_server').value,
                bio: document.getElementById('prof_bio').value,
                updated_at: new Date()
            });
            alert("Settings updated!");
        };

        async function loadMyProducts(userId) {
            const { data } = await client.from('products').select('*').eq('seller_id', userId).order('created_at', {ascending: false});
            const container = document.getElementById('my-listings');
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="p-12 text-center text-stone-700 italic border border-dashed border-stone-900 rounded-3xl">No listings yet.</div>`;
                return;
            }
            container.innerHTML = data.map(item => `
                <div class="p-5 bg-[#111] border border-stone-900 rounded-2xl flex justify-between items-center group hover:border-stone-700 transition-all">
                    <div class="flex gap-4 items-center">
                        <div class="w-10 h-10 bg-stone-900 rounded-lg flex items-center justify-center text-stone-600"><i data-lucide="package" class="w-5 h-5"></i></div>
                        <div>
                            <p class="text-white font-bold mb-1">${item.item_name} <span class="text-yellow-600 text-[10px] ml-2 font-mono">QL ${item.base_ql}</span></p>
                            <div class="flex gap-2 text-[9px] font-black uppercase text-stone-600">
                                <span>${item.category}</span> • <span>Qty: ${item.quantity}</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteProduct('${item.id}')" class="p-2 text-stone-600 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`).join('');
            lucide.createIcons();
        }

        window.deleteProduct = async (id) => {
            if (confirm('Remove this listing?')) {
                await client.from('products').delete().eq('id', id);
                const { data: { user } } = await client.auth.getUser();
                loadMyProducts(user.id);
            }
        };

        window.handleLogout = async () => { await client.auth.signOut(); window.location.href = 'index.html'; };
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
