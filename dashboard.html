<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .dashboard-card { background: #141414; border: 1px solid #222; border-radius: 1.5rem; padding: 2rem; }
        .input-field { background: #0f0f0f; border: 1px solid #222; color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; outline: none; font-size: 0.875rem; }
        .input-field:focus { border-color: #d4af37; }
        .gold-btn { background: #d4af37; color: black; font-weight: 800; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.3s; cursor: pointer; border: none; }
        .gold-btn:hover { background: #f4cf67; transform: translateY(-2px); }
        .message-pill { background: #1a1a1a; border-left: 4px solid #d4af37; transition: all 0.2s; }
        
        /* CROSS-BROWSER FIX FOR NUMBER SPINNERS */
        input[type="number"] { -moz-appearance: textfield; } /* Firefox */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            opacity: 1 !important; 
            filter: invert(1) brightness(10); 
            cursor: pointer;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4">
            <a href="index.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Market
            </a>
            <button onclick="handleLogout()" class="flex items-center gap-3 text-red-900 hover:text-red-500 transition-all font-bold uppercase text-[10px] tracking-widest mt-10">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <section class="mb-10 dashboard-card">
                <h3 class="text-lg font-black text-white mb-6 uppercase italic">Merchant Profile</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Name</label>
                        <input type="text" id="prof_name" class="input-field" placeholder="Character Name">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Server</label>
                        <select id="prof_server" class="input-field">
                            <option value="Cadence">Cadence</option>
                            <option value="Harmony">Harmony</option>
                            <option value="Melody">Melody</option>
                            <option value="Pristine">Pristine</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="updateProfile()" class="gold-btn w-full">Save Profile</button>
                    </div>
                </div>
            </section>

            <section class="mb-10 dashboard-card">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black text-white uppercase italic">Customer Inquiries</h3>
                    <span id="msg-count" class="bg-yellow-600 text-black text-[10px] font-black px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="message-container" class="space-y-4 max-h-64 overflow-y-auto pr-2"></div>
            </section>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1">
                    <div id="form-container" class="dashboard-card sticky top-10">
                        <h3 id="form-title" class="text-lg font-black text-white mb-6 uppercase italic">Add Listing</h3>
                        <form id="product-form" class="space-y-4">
                            <input type="hidden" id="edit-id">
                            <input type="text" id="item_name" class="input-field" placeholder="Item Name" required>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[10px] text-stone-600 uppercase font-black mb-1 block">QL</label><input type="number" id="base_ql" class="input-field" value="50"></div>
                                <div><label class="text-[10px] text-stone-600 uppercase font-black mb-1 block">Qty</label><input type="text" id="quantity" class="input-field" value="1"></div>
                            </div>

                            <label class="text-[10px] text-stone-600 uppercase font-black block">Price</label>
                            <div class="grid grid-cols-4 gap-1">
                                <input type="number" id="price_g" class="input-field !p-2 border-yellow-800" value="0">
                                <input type="number" id="price_s" class="input-field !p-2 border-stone-700" value="0">
                                <input type="number" id="price_c" class="input-field !p-2 border-orange-900" value="0">
                                <input type="number" id="price_i" class="input-field !p-2 border-stone-800" value="0">
                            </div>
                            <button type="submit" id="submit-btn" class="gold-btn">Post Listing</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <h3 class="text-lg font-black text-white mb-6 uppercase italic">Inventory</h3>
                    <div id="my-listings" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const client = createClient('https://gjftmhvteylhtlwcouwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnRtaHZ0ZXlsaHRsd2NvdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTg5MDUsImV4cCI6MjA4NDQ5NDkwNX0.SBELcOhXZrm8fWHTaC1Ujjo-ZL7qUelFjxs7hmWGY5k');

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            
            const { data: profile } = await client.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (profile) {
                document.getElementById('prof_name').value = profile.character_name || "";
                document.getElementById('prof_server').value = profile.server_name || "Cadence";
            }
            
            loadMyProducts(user.id);
            loadMessages(user.id);
        }

        async function loadMessages(userId) {
            const { data } = await client.from('inquiries').select('*').eq('seller_id', userId).order('created_at', { ascending: false });
            const container = document.getElementById('message-container');
            if (!data || data.length === 0) { container.innerHTML = "<p class='text-stone-700 italic text-sm'>No messages.</p>"; return; }
            document.getElementById('msg-count').innerText = data.length;
            container.innerHTML = data.map(msg => `
                <div class="p-4 rounded-xl message-pill flex justify-between">
                    <div><p class="text-xs font-bold text-yellow-600 uppercase">${msg.sender_name}</p><p class="text-sm">${msg.message}</p></div>
                    <button onclick="deleteMessage('${msg.id}')" class="text-stone-700 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`).join('');
            lucide.createIcons();
        }

        window.deleteMessage = async (id) => {
            if (confirm('Delete inquiry?')) {
                const { error } = await client.from('inquiries').delete().eq('id', id);
                if (error) { alert("ERROR: " + error.message); console.error(error); }
                else { const { data: { user } } = await client.auth.getUser(); loadMessages(user.id); }
            }
        };

        async function loadMyProducts(userId) {
            const { data } = await client.from('products').select('*').eq('seller_id', userId);
            const container = document.getElementById('my-listings');
            if (!data || data.length === 0) { container.innerHTML = "<div class='p-10 text-center text-stone-700 italic border border-dashed border-stone-900 rounded-3xl'>No listings.</div>"; return; }
            container.innerHTML = data.map(item => `
                <div class="p-5 bg-[#111] border border-stone-900 rounded-2xl flex justify-between items-center">
                    <p class="text-white font-bold">${item.item_name} (QL ${item.base_ql})</p>
                    <button onclick="deleteProduct('${item.id}')" class="text-stone-600 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`).join('');
            lucide.createIcons();
        }

        window.deleteProduct = async (id) => {
            if (confirm('Delete this item?')) {
                const { error } = await client.from('products').delete().eq('id', id);
                if (error) alert("DELETE FAILED: " + error.message);
                else { const { data: { user } } = await client.auth.getUser(); loadMyProducts(user.id); }
            }
        };

        window.updateProfile = async () => {
            const { data: { user } } = await client.auth.getUser();
            const { error } = await client.from('profiles').upsert({
                id: user.id,
                character_name: document.getElementById('prof_name').value,
                server_name: document.getElementById('prof_server').value,
                updated_at: new Date()
            });
            if (!error) alert("Profile Saved!");
            else alert("Error: " + error.message);
        };

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { user } } = await client.auth.getUser();
            const itemData = {
                item_name: document.getElementById('item_name').value,
                base_ql: parseFloat(document.getElementById('base_ql').value),
                quantity: document.getElementById('quantity').value,
                price_g: parseInt(document.getElementById('price_g').value) || 0,
                price_s: parseInt(document.getElementById('price_s').value) || 0,
                price_c: parseInt(document.getElementById('price_c').value) || 0,
                price_i: parseInt(document.getElementById('price_i').value) || 0,
                seller_id: user.id
            };
            await client.from('products').insert([itemData]);
            loadMyProducts(user.id);
            e.target.reset();
        };

        window.handleLogout = async () => { await client.auth.signOut(); window.location.href = 'index.html'; };
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
