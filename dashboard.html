<section class="mb-12">
    <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
        <i data-lucide="mail" class="w-5 h-5 text-yellow-500"></i>
        Customer Inquiries
    </h3>
    <div id="inquiry-list" class="grid grid-cols-1 gap-4">
        <div class="p-8 border border-stone-800 rounded-2xl text-stone-600 italic text-center">
            No new messages.
        </div>
    </div>
</section>

<div>
    <label class="block text-[10px] font-black text-stone-500 uppercase mb-2">Category</label>
    <select id="item-category" class="w-full bg-stone-900 border border-stone-800 p-3 rounded-xl text-white outline-none focus:border-yellow-600">
        <option value="Carpentry">Carpentry (Furniture, Tools)</option>
        <option value="Smithing">Smithing (Armor, Weapons)</option>
        <option value="Mining">Mining (Ores, Gems)</option>
        <option value="Masonry">Masonry (Bricks, Stone)</option>
        <option value="Tailoring">Tailoring (Cloth, Leather)</option>
        <option value="Farming">Farming (Crops, Seeds)</option>
        <option value="Cooking">Cooking (Meals, Drinks)</option>
        <option value="Jewelry">Jewelry (Rings, Statuettes)</option>
        <option value="Alchemy">Alchemy (Potions, Dyes)</option>
        <option value="Shipbuilding">Shipbuilding (Boats, Sails)</option>
        <option value="Animal Husbandry">Animal Husbandry (Animals, Tack)</option>
        <option value="Misc">Misc (Rare Skins, Rifts)</option>
    </select>
</div>

<script>
    // Logic to load inquiries for the logged-in seller
    async function loadInquiries() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) return;

        const { data: messages, error } = await client.from('inquiries')
            .select('*')
            .eq('seller_id', user.id)
            .order('created_at', { ascending: false });

        if (messages && messages.length > 0) {
            const container = document.getElementById('inquiry-list');
            container.innerHTML = messages.map(msg => `
                <div class="p-6 bg-stone-900/50 border border-stone-800 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-yellow-600 uppercase mb-1">Inquiry for: ${msg.item_name}</p>
                        <p class="text-white text-sm mb-2">"${msg.message}"</p>
                        <p class="text-[10px] text-stone-500 uppercase">${new Date(msg.created_at).toLocaleString()}</p>
                    </div>
                    <button onclick="deleteInquiry('${msg.id}')" class="p-3 hover:bg-red-900/20 text-stone-600 hover:text-red-500 rounded-xl transition-all">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }
    }

    async function deleteInquiry(id) {
        if(confirm('Delete this message?')) {
            await client.from('inquiries').delete().eq('id', id);
            loadInquiries();
        }
    }

    document.addEventListener('DOMContentLoaded', loadInquiries);
</script>
