<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portal | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        
        .search-input { 
            background: #111; 
            border: 1px solid #222; 
            color: white; 
            padding: 0.6rem 1rem; 
            border-radius: 0.75rem; 
            outline: none; 
            font-size: 0.75rem; 
            width: 100%;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #d4af37; }

        .glass-panel {
            background: linear-gradient(180deg, #141414 0%, #0c0c0c 100%);
            border: 1px solid #1f1f1f;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .label-text {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            color: #444;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
            display: block;
        }

        .currency-tag {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 900;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        <nav class="space-y-4 mb-10">
            <a href="index.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i> Market Home
            </a>
            <button onclick="signOut()" class="flex items-center gap-3 text-red-900 hover:text-red-500 transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
            </button>
        </nav>

        <div class="mt-auto pt-6 border-t border-stone-900">
            <span class="label-text">Merchant Settings</span>
            <input type="text" id="char-name" placeholder="Character Name" class="search-input mb-3">
            <select id="char-server" class="search-input mb-3">
                <option value="Cadence">Cadence</option>
                <option value="Harmony">Harmony</option>
                <option value="Melody">Melody</option>
                <option value="Zenith">Zenith</option>
            </select>
            <textarea id="char-bio" placeholder="Shop description..." class="search-input mb-4 h-24 text-[10px]"></textarea>
            <button onclick="saveProfile()" class="w-full py-3 bg-white text-black text-[10px] font-black uppercase rounded-xl hover:bg-yellow-600 transition-all">Save Profile</button>
        </div>
    </aside>

    <main class="flex-1 p-16 flex gap-12">
        <div class="w-1/3">
            <div class="glass-panel p-8 sticky top-16">
                <h2 id="form-title" class="text-white font-black uppercase text-xl mb-8 tracking-tighter">Add New Listing</h2>
                <form id="add-item-form" class="space-y-5">
                    <input type="hidden" id="edit-item-id">
                    
                    <div>
                        <label class="label-text">Item Name</label>
                        <input type="text" id="item-name" placeholder="e.g. Rare Large Maul" class="search-input" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Category</label>
                            <select id="item-cat" class="search-input">
                                <option value="Tools">Tools</option>
                                <option value="Armor">Armor</option>
                                <option value="Weapons">Weapons</option>
                                <option value="Resources">Resources</option>
                                <option value="Bred Animals">Bred Animals</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Rarity</label>
                            <select id="item-rarity" class="search-input">
                                <option value="Common">Common</option>
                                <option value="Rare">Rare</option>
                                <option value="Supreme">Supreme</option>
                                <option value="Fantastic">Fantastic</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Quality (QL)</label>
                            <input type="number" id="item-ql" placeholder="50" class="search-input">
                        </div>
                        <div>
                            <label class="label-text">Quantity</label>
                            <input type="number" id="item-qty" placeholder="1" class="search-input">
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Price (G / S / C)</label>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="relative">
                                <input type="number" id="price-g" placeholder="0" class="search-input pr-6">
                                <span class="currency-tag text-yellow-600">G</span>
                            </div>
                            <div class="relative">
                                <input type="number" id="price-s" placeholder="0" class="search-input pr-6">
                                <span class="currency-tag text-stone-400">S</span>
                            </div>
                            <div class="relative">
                                <input type="number" id="price-c" placeholder="0" class="search-input pr-6">
                                <span class="currency-tag text-orange-700">C</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 space-y-3">
                        <button type="submit" id="submit-btn" class="w-full py-4 bg-yellow-600 text-black text-[11px] font-black uppercase rounded-2xl hover:bg-white transition-all shadow-lg shadow-yellow-900/20">List Item on Hub</button>
                        <button type="button" id="cancel-edit" onclick="resetForm()" class="w-full py-3 text-stone-600 text-[9px] font-black uppercase hidden">Cancel Edit</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="flex-1">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h2 class="text-white font-black uppercase text-3xl tracking-tighter">Your Inventory</h2>
                    <p class="text-stone-600 text-[10px] font-bold uppercase tracking-widest mt-1">Live listings on the Wurm Hub market</p>
                </div>
            </div>
            <div id="my-inventory" class="space-y-4">
                </div>
        </div>
    </main>

    <script src="dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
