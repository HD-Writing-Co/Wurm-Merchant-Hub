<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        .dashboard-card { background: #141414; border: 1px solid #222; border-radius: 1.5rem; padding: 2rem; }
        .input-field { background: #0f0f0f; border: 1px solid #222; color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; outline: none; }
        .gold-btn { background: #d4af37; color: black; font-weight: 800; padding: 0.75rem; border-radius: 0.75rem; }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase">WURM HUB</h1>
        <a href="index.html" class="flex items-center gap-3 text-stone-500 hover:text-white uppercase text-[10px] font-bold"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Market</a>
    </aside>

    <main class="flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            <section class="mb-12 dashboard-card">
                <h3 class="text-lg font-black text-white mb-6 uppercase italic">Merchant Profile Settings</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div><label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Character Name</label><input type="text" id="prof_name" class="input-field"></div>
                    <div><label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Home Server</label><select id="prof_server" class="input-field"><option value="Cadence">Cadence</option><option value="Harmony">Harmony</option><option value="Melody">Melody</option><option value="Pristine">Pristine</option></select></div>
                    <div class="md:col-span-2"><label class="text-[10px] font-black text-stone-600 uppercase mb-2 block">Merchant Bio</label><input type="text" id="prof_bio" class="input-field"></div>
                    <div class="flex items-end"><button onclick="updateProfile()" class="gold-btn w-full">Update Profile</button></div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1">
                    <div id="form-container" class="dashboard-card sticky top-10">
                        <h3 id="form-title" class="text-lg font-black text-white mb-6 uppercase italic">Add Listing</h3>
                        <form id="product-form" class="space-y-4">
                            <input type="hidden" id="edit-id">
                            <input type="text" id="item_name" class="input-field" placeholder="Item Name" required>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="base_ql" class="input-field" placeholder="QL" value="50">
                                <input type="text" id="quantity" class="input-field" placeholder="Quantity" value="1">
                            </div>
                            <div class="grid grid-cols-4 gap-1">
                                <input type="number" id="price_g" class="input-field" placeholder="G">
                                <input type="number" id="price_s" class="input-field" placeholder="S">
                                <input type="number" id="price_c" class="input-field" placeholder="C">
                                <input type="number" id="price_i" class="input-field" placeholder="I">
                            </div>
                            <button type="submit" id="submit-btn" class="gold-btn w-full">Post Listing</button>
                        </form>
                    </div>
                </div>
                <div class="lg:col-span-2"><h3 class="text-lg font-black text-white mb-6 uppercase italic">Your Inventory</h3><div id="my-listings" class="space-y-3"></div></div>
            </div>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const client = createClient('https://gjftmhvteylhtlwcouwg.supabase.co', 'YOUR_KEY');

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) return;
            const { data: profile } = await client.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                document.getElementById('prof_name').value = profile.character_name || "";
                document.getElementById('prof_server').value = profile.server_name || "Cadence";
                document.getElementById('prof_bio').value = profile.bio || "";
            }
            loadProducts(user.id);
        }

        async function updateProfile() {
            const { data: { user } } = await client.auth.getUser();
            await client.from('profiles').upsert({ id: user.id, character_name: document.getElementById('prof_name').value, server_name: document.getElementById('prof_server').value, bio: document.getElementById('prof_bio').value });
            alert("Profile updated!");
        }

        async function loadProducts(userId) {
            const { data } = await client.from('products').select('*').eq('seller_id', userId);
            document.getElementById('my-listings').innerHTML = data.map(item => `<div class="p-5 bg-[#111] border border-stone-900 rounded-2xl flex justify-between items-center"><div><p class="text-white font-bold">${item.item_name}</p></div><div class="flex gap-2"><button onclick="editProduct(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="text-blue-500"><i data-lucide="edit-3"></i></button><button onclick="deleteProduct('${item.id}')" class="text-red-500"><i data-lucide="trash-2"></i></button></div></div>`).join('');
            lucide.createIcons();
        }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { user } } = await client.auth.getUser();
            const payload = { item_name: document.getElementById('item_name').value, seller_id: user.id, price_g: document.getElementById('price_g').value || 0, price_s: document.getElementById('price_s').value || 0, price_c: document.getElementById('price_c').value || 0, price_i: document.getElementById('price_i').value || 0, base_ql: document.getElementById('base_ql').value, quantity: document.getElementById('quantity').value };
            const editId = document.getElementById('edit-id').value;
            if (editId) await client.from('products').update(payload).eq('id', editId);
            else await client.from('products').insert([payload]);
            location.reload();
        };

        window.editProduct = (item) => {
            document.getElementById('edit-id').value = item.id;
            document.getElementById('item_name').value = item.item_name;
            document.getElementById('submit-btn').innerText = "Update Listing";
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
