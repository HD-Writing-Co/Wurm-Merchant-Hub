<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portal | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        
        .search-input { 
            background: #111; border: 1px solid #222; color: white; padding: 0.6rem 1rem; 
            border-radius: 0.75rem; outline: none; font-size: 0.75rem; width: 100%;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #d4af37; }

        .glass-panel {
            background: linear-gradient(180deg, #141414 0%, #0c0c0c 100%);
            border: 1px solid #1f1f1f; border-radius: 2rem;
        }

        .label-text {
            font-size: 9px; font-weight: 900; text-transform: uppercase;
            color: #444; letter-spacing: 0.1em; margin-bottom: 0.25rem; display: block;
        }

        .currency-tag {
            position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
            font-size: 9px; font-weight: 900; pointer-events: none;
        }

        /* Forum Thread Styling for Inquiries */
        .inquiry-thread {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #222 #0b0b0b;
        }
        .inquiry-thread::-webkit-scrollbar { width: 6px; }
        .inquiry-thread::-webkit-scrollbar-track { background: #0b0b0b; }
        .inquiry-thread::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        
        .forum-post {
            border-left: 3px solid #d4af37;
            background: rgba(255,255,255,0.02);
        }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <a href="index.html" class="block mb-10 group">
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter group-hover:text-yellow-600 transition-colors">
                WURM <span class="text-yellow-600 group-hover:text-white">HUB</span>
            </h1>
        </a>

        <nav class="space-y-4 mb-10">
            <a href="index.html" class="flex items-center gap-3 text-stone-500 hover:text-white transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="shopping-cart" class="w-4 h-4"></i> Marketplace
            </a>
            <button onclick="signOut()" class="flex items-center gap-3 text-red-900 hover:text-red-500 transition-all font-bold uppercase text-[10px] tracking-widest">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
            </button>
        </nav>

        <div class="mt-auto pt-6 border-t border-stone-900">
            <span class="label-text">Merchant Settings</span>
            <input type="text" id="char-name" placeholder="Character Name" class="search-input mb-3">
            <select id="char-server" class="search-input mb-3">
                <option value="Cadence">Cadence</option>
                <option value="Harmony">Harmony</option>
                <option value="Melody">Melody</option>
                <option value="Zenith">Zenith</option>
                <option value="Defiance">Defiance</option>
            </select>
            <textarea id="char-bio" placeholder="Shop description..." class="search-input mb-4 h-24 text-[10px]"></textarea>
            
            <div class="mt-4 pt-6 border-t border-stone-800">
                <span class="label-text">Discord Notifications</span>
                <input type="text" id="discord-id" placeholder="Discord User ID" class="search-input mb-3">
                <button onclick="saveProfile()" class="w-full py-3 bg-[#5865F2] text-white text-[10px] font-black uppercase rounded-xl hover:opacity-90 transition-all">
                    Link Discord
                </button>
            </div>
            
            <button onclick="saveProfile()" class="w-full mt-4 py-3 bg-white text-black text-[10px] font-black uppercase rounded-xl hover:bg-yellow-600 transition-all">Update Profile</button>
        </div>
    </aside>

    <main class="flex-1 p-16 overflow-y-auto">
        
        <section class="max-w-4xl mx-auto mb-16 bg-[#111]/50 border border-stone-900 rounded-3xl p-8">
            <h2 class="text-white font-black uppercase text-xl tracking-tighter mb-6 flex items-center gap-2">
                <i data-lucide="message-square" class="w-5 h-5 text-yellow-600"></i> Market Inquiries
            </h2>
            <div id="merchant-inbox" class="inquiry-thread pr-4 space-y-1">
                </div>
        </section>

        <hr class="border-stone-900 mb-16 max-w-6xl mx-auto">

        <div class="flex gap-12 max-w-6xl mx-auto">
            
            <div class="w-[360px]">
                <div class="glass-panel p-8 sticky top-16">
                    <h2 id="form-title" class="text-white font-black uppercase text-xl mb-8 tracking-tighter">Add New Listing</h2>
                    <form id="add-item-form" class="space-y-5" onsubmit="handleFormSubmit(event)">
                        <input type="hidden" id="edit-item-id">
                        
                        <div>
                            <label class="label-text">Item Name</label>
                            <input type="text" id="item-name" placeholder="e.g. Rare Pickaxe" class="search-input" required>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-text">Category</label>
                                <select id="item-cat" class="search-input">
                                    <option value="Tools">Tools</option>
                                    <option value="Armor">Armor</option>
                                    <option value="Weapons">Weapons</option>
                                    <option value="Resources">Resources</option>
                                    <option value="Bred Animals">Bred Animals</option>
                                    <option value="Jewelry">Jewelry</option>
                                </select>
                            </div>
                            <div>
                                <label class="label-text">Rarity</label>
                                <select id="item-rarity" class="search-input">
                                    <option value="Common">Common</option>
                                    <option value="Rare">Rare</option>
                                    <option value="Supreme">Supreme</option>
                                    <option value="Fantastic">Fantastic</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-text">Quality (QL)</label>
                                <input type="number" id="item-ql" step="0.01" placeholder="50.00" class="search-input">
                            </div>
                            <div>
                                <label class="label-text">Stock</label>
                                <input type="number" id="item-qty" placeholder="1" class="search-input">
                            </div>
                        </div>

                        <div>
                            <label class="label-text">Price (G / S / C / I)</label>
                            <div class="grid grid-cols-4 gap-2">
                                <div class="relative">
                                    <input type="number" id="price-g" value="0" class="search-input !px-2 text-center">
                                    <span class="currency-tag text-yellow-500">G</span>
                                </div>
                                <div class="relative">
                                    <input type="number" id="price-s" value="0" class="search-input !px-2 text-center">
                                    <span class="currency-tag text-stone-400">S</span>
                                </div>
                                <div class="relative">
                                    <input type="number" id="price-c" value="0" class="search-input !px-2 text-center">
                                    <span class="currency-tag text-orange-700">C</span>
                                </div>
                                <div class="relative">
                                    <input type="number" id="price-i" value="0" class="search-input !px-2 text-center">
                                    <span class="currency-tag text-blue-300">I</span>
                                </div>
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="submit" id="submit-btn" class="w-full py-4 bg-yellow-600 text-black text-[11px] font-black uppercase rounded-2xl hover:bg-white transition-all shadow-lg shadow-yellow-900/20">List Item on Hub</button>
                            <button type="button" id="cancel-edit" onclick="resetForm()" class="w-full mt-2 py-3 text-stone-600 text-[9px] font-black uppercase hidden">Cancel Edit</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="flex-1">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-white font-black uppercase text-3xl tracking-tighter">Your Inventory</h2>
                </div>
                <div id="my-inventory" class="space-y-4">
                    </div>
            </div>

        </div>
    </main>

    <script src="dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
