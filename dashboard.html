<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portal | Wurm Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #0b0b0b; color: #e5d5b5; font-family: 'Inter', sans-serif; }
        
        .search-input { 
            background: #111; border: 1px solid #222; color: white; padding: 0.6rem 1rem; 
            border-radius: 0.75rem; outline: none; font-size: 0.75rem; width: 100%;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #d4af37; }

        .glass-panel {
            background: linear-gradient(180deg, #141414 0%, #0c0c0c 100%);
            border: 1px solid #222;
            border-radius: 2rem;
        }

        .label-text { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #555; letter-spacing: 0.1em; margin-bottom: 0.5rem; display: block; }
        .currency-tag { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-weight: 900; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-80 bg-[#0f0f0f] border-r border-stone-900 p-8 flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black italic text-white mb-10 uppercase tracking-tighter">WURM <span class="text-yellow-600">HUB</span></h1>
        
        <div class="space-y-6">
            <div>
                <span class="label-text">Character Name</span>
                <input type="text" id="char-name" placeholder="Ingame Name" class="search-input">
            </div>
            <div>
                <span class="label-text">Server</span>
                <select id="char-server" class="search-input">
                    <option value="Cadence">Cadence</option>
                    <option value="Harmony">Harmony</option>
                    <option value="Melody">Melody</option>
                    <option value="Defiance">Defiance</option>
                </select>
            </div>
            <div>
                <span class="label-text">Merchant Bio</span>
                <textarea id="char-bio" rows="3" placeholder="Briefly describe your shop..." class="search-input"></textarea>
            </div>
            
            <div class="pt-6 border-t border-stone-800">
                <span class="label-text text-yellow-600">Discord Notification ID</span>
                <input type="text" id="discord-id" placeholder="Paste User ID here" class="search-input mb-3">
                <p class="text-[9px] text-stone-600 italic mb-4">Enable Developer Mode in Discord to copy your ID.</p>
                <button onclick="saveProfile()" class="w-full py-3 bg-yellow-600 text-black text-[10px] font-black uppercase rounded-xl hover:bg-white transition-all">Save Profile Settings</button>
            </div>
        </div>

        <div class="mt-auto">
            <button onclick="signOut()" class="text-stone-600 hover:text-red-500 text-[10px] font-black uppercase tracking-widest transition-all">Sign Out</button>
        </div>
    </aside>

    <main class="flex-1 p-16 flex gap-16">
        <div class="w-1/3">
            <div class="glass-panel p-8 sticky top-16">
                <h2 id="form-title" class="text-white font-black uppercase text-xl mb-6 tracking-tighter">Add New Listing</h2>
                <form id="add-item-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
                    <input type="hidden" id="edit-item-id">
                    
                    <div>
                        <span class="label-text">Item Name</span>
                        <input type="text" id="item-name" placeholder="e.g. Rare Pickaxe" class="search-input" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="label-text">Category</span>
                            <select id="item-cat" class="search-input">
                                <option>Tools</option>
                                <option>Armor</option>
                                <option>Weapons</option>
                                <option>Resources</option>
                                <option>Bred Animals</option>
                                <option>Jewelry</option>
                            </select>
                        </div>
                        <div>
                            <span class="label-text">Rarity</span>
                            <select id="item-rarity" class="search-input">
                                <option>Common</option>
                                <option>Rare</option>
                                <option>Supreme</option>
                                <option>Fantastic</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="label-text">Quality (QL)</span>
                            <input type="number" id="item-ql" placeholder="10.00" class="search-input">
                        </div>
                        <div>
                            <span class="label-text">Stock</span>
                            <input type="number" id="item-qty" value="1" class="search-input">
                        </div>
                    </div>

                    <div>
                        <span class="label-text">Price (G / S / C)</span>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="relative">
                                <input type="number" id="price-g" value="0" class="search-input pr-6">
                                <span class="currency-tag text-yellow-500">G</span>
                            </div>
                            <div class="relative">
                                <input type="number" id="price-s" value="0" class="search-input pr-6">
                                <span class="currency-tag text-stone-400">S</span>
                            </div>
                            <div class="relative">
                                <input type="number" id="price-c" value="0" class="search-input pr-6">
                                <span class="currency-tag text-orange-700">C</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 space-y-3">
                        <button type="submit" id="submit-btn" class="w-full py-4 bg-yellow-600 text-black text-[11px] font-black uppercase rounded-2xl hover:bg-white transition-all">List Item on Hub</button>
                        <button type="button" id="cancel-edit" onclick="resetForm()" class="w-full py-3 text-stone-600 text-[9px] font-black uppercase hidden">Cancel Edit</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mb-12">
            <h2 class="text-white font-black uppercase text-xl tracking-tighter mb-6 flex items-center gap-2">
             <i data-lucide="inbox" class="w-5 h-5 text-yellow-600"></i> Recent Inquiries
          </h2>
         <div id="merchant-inbox" class="grid grid-cols-1 gap-3">
             </div>
        </div>

        <div class="flex-1">
            <h2 class="text-white font-black uppercase text-3xl tracking-tighter mb-10">Your Inventory</h2>
            <div id="my-inventory" class="space-y-4"></div>
        </div>
    </main>

    <script src="dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
